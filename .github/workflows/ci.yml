name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ./lore-core
        pip install -e ./lore-daemon
        pip install -e ./lore-cli
        pip install pytest ruff mypy types-PyYAML
    - name: Lint with ruff
      run: ruff check .
    - name: Type check with mypy
      run: mypy lore-core/src lore-cli/src lore-daemon/src --ignore-missing-imports
    - name: Run tests
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/lore-core/src:$(pwd)/lore-cli:$(pwd)/lore-daemon
        pytest
